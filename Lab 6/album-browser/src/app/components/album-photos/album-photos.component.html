<h1>Album Photos</h1>

<div *ngIf="isLoading">
  Loading photos...
</div>

<div *ngIf="!isLoading && errorMessage">
  {{ errorMessage }}
</div>

<div *ngIf="!isLoading && !errorMessage && photos.length === 0">
  No photos found.
</div>

<div *ngIf="!isLoading && !errorMessage && photos.length > 0" class="photo-grid">
  <div *ngFor="let photo of photos" class="photo-item">
    <img [src]="photo.thumbnailUrl" [alt]="photo.title" />
    <div class="photo-title">{{ photo.title }}</div>
  </div>
</div>

<button (click)="goBack()">Back</button>
