<div class="products-grid">
  <div class="product-card" *ngFor="let product of products">
    <a [href]="product.link" target="_blank">
      <img [src]="product.image" [alt]="product.name" class="product-image" />
    </a>

    <h2>{{ product.name }}</h2>

    <p class="description">
      {{ product.description }}
    </p>

    <p class="price">{{ product.price | number }} KZT</p>

    <div class="rating">
      Rating: {{ product.rating }} ★
    </div>

    <div class="gallery">
      <img
        *ngFor="let img of product.images"
        [src]="img"
        [alt]="product.name"
        class="thumb"
      />
    </div>

    <div class="actions">
      <button (click)="openWhatsApp(product)">Share WhatsApp</button>
      <button (click)="openTelegram(product)">Share Telegram</button>
      <a [href]="product.link" target="_blank">Open on Kaspi</a>
    </div>
  </div>
</div>
