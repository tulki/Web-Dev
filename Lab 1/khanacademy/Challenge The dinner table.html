<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Challenge: The dinner table</title>
    </head>
    <body>
    
        <h1>Our dinner menu</h1>

        <table>
            <thead>
                <tr>
                    <th>Meal</th>
                    <th>Ingredients</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                <tr> 
                    <td> Sorpa </td>
                    <td> Love </td>
                    <td> Infinity </td>
                </tr>
                <tr> 
                    <td> Sorpa 2 </td>
                    <td> 2 * Love </td>
                    <td> 2 * Infinity </td>
                </tr>
                <tr> 
                    <td> Sorpa 3 </td>
                    <td> 3 * Love </td>
                    <td> 3 * Infinity </td>
                </tr>
            </tbody>
        </table>

    </body>
</html>
